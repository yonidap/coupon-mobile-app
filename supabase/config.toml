# Supabase project config
# Generated for: Coupon Wallet MVP
# Reference: https://supabase.com/docs/reference/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_anonymous_sign_ins = false

[functions]

[functions.process-reminders]
# We handle authorization ourselves via PROCESS_REMINDERS_SECRET.
# Setting verify_jwt = false means Supabase will not require a valid user JWT,
# which is correct since this function is called by the cron system, not a user.
verify_jwt = false
import_map = "./functions/import_map.json"

[functions.extract-voucher-draft]
verify_jwt = false
import_map = "./functions/import_map.json"
